Section "Device"
    Identifier "GPU"
    Driver "modesetting"
EndSection
Section "Monitor"
    Identifier "Monitor"
    HorizSync 28-80
    VertRefresh 48-75
EndSection
Section "Screen"
    Identifier "Screen"
    Device "GPU"
    Monitor "Monitor"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1920x1080"
        Virtual 1920 1080
    EndSubSection
EndSection
